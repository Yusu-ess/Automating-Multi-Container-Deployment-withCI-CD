version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DB_URL=mongodb://db:27017/tasks
    depends_on:
      - db

  db:
    image: mongo:latest
    volumes:
      - db_data:/data/db
      - ./init.js:/docker-entrypoint-initdb.d/init.js

volumes:
  db_data:
